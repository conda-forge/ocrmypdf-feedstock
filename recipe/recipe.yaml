schema_version: 1

context:
  name: ocrmypdf
  version: "14.2.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ocrmypdf-${{ version }}.tar.gz
  sha256: eb78822c725c2c6143d4fd642f73e6d3c7a032651ac5fa1a9a741f019f21a714

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - ocrmypdf = ocrmypdf.__main__:run

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - setuptools_scm
    - setuptools_scm_git_archive
  run:
    - python >=${{ python_min }}
    - deprecation >=2.1.0
    - coloredlogs >=15
    - img2pdf >=0.4
    - packaging >=20
    - pdfminer.six >=20201018
    - pikepdf >=5.1
    - pillow >=8.3.2
    - pluggy >=0.13.0
    - reportlab >=3.5
    - importlib_resources
    - importlib-metadata
    - tqdm >=4
    - ghostscript >=9.5
    - img2pdf
    - pngquant
    - qpdf
    - tesseract >=4.1.1
    - unpaper
    - packaging

tests:
  - python:
      imports:
        - ocrmypdf
        - ocrmypdf._exec
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
    script:
      - ocrmypdf --help

about:
  summary: OCRmyPDF adds an OCR text layer to scanned PDF files, allowing them to be searched
  license: MPL-2.0
  license_file: LICENSE
  homepage: https://github.com/jbarlow83/OCRmyPDF
  repository: https://github.com/jbarlow83/ocrmypdf

extra:
  recipe-maintainers:
    - izahn
    - carlodri
