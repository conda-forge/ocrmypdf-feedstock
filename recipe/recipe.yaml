# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: ocrmypdf
  version: "17.7.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ocrmypdf-${{ version }}.tar.gz
  sha256: d61184b84e3001ebe7c5acb265041bd8591f924b8616bbefc746a5bdafab3eca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ocrmypdf = ocrmypdf.__main__:run

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4
    - deprecation >=2.1.0
    - img2pdf >=0.5
    - packaging >=20
    - pdfminer.six >=20220319
    #- pi-heif # Note conda package is pillow-heif
    - pillow-heif # Note conda package pdfminer-six is returning version 0.0.0
    - pikepdf >=10
    - pypdfium2 >=5.0.0
    - pillow >=10.0.1
    - pydantic >=2.12.5
    - pluggy >=1
    - rich >=13
    - uharfbuzz >=0.53.2
    - pdfminer-six >=20220319 # Note conda package pdfminer-six is returning version 0.0.0

tests:
  - python:
      imports:
        - ocrmypdf
        - ocrmypdf._exec
      pip_check: false
      #│ │ ocrmypdf 16.11.1 requires pi-heif, which is not installed. # Note conda package is pillow-heif
      #│ │ ocrmypdf 16.11.1 has requirement pdfminer-six>=20220319, but you have pdfminer-six 0.0.0. # Note conda package pdfminer-six is returning version 0.0.0
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - ocrmypdf --help

about:
  summary: OCRmyPDF adds an OCR text layer to scanned PDF files, allowing them to be searched
  license: MPL-2.0
  license_file: LICENSE
  repository: https://github.com/ocrmypdf/OCRmyPDF
  homepage: https://github.com/jbarlow83/OCRmyPDF

extra:
  recipe-maintainers:
    - izahn
    - carlodri
    - rxm7706
